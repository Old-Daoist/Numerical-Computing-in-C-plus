[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "matrixv1"
version = "1.0.0"
description = "Numerical computing library — matrix operations, linear solvers, eigenvalue methods, interpolation"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["matrixv1*"]
